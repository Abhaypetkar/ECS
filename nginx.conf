events {
    worker_connections 1024;
}

http {
    # This simulates what an ALB (Application Load Balancer) does in AWS
    # Distributes requests across the 2 containers (simulating 2 EC2 instances)
    upstream dubbing_service {
        # Round-robin load balancing (default)
        server dubbing-instance-1:5000;
        server dubbing-instance-2:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://dubbing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }
    }
}
